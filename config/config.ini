[scan]
# Folder to scan (supports environment variables)
directory = %USERPROFILE%\Desktop\

# File patterns – define ANY file types you want to clean (comma‑separated)
patterns = *.ppt, *.pptx

# Scan sub‑directories? true or false
recursive = false

[time]
# Days: 0 means "no restriction"
creation_days = 3      # Move files older than 3 days (created)
access_days = 2        # Move files older than 2 days (last opened)

Time logic
A file is moved only if both conditions are met (when days > 0):

file creation time < now - creation_days

file last access time < now - access_days

If you set a threshold to 0, that condition is ignored (for example, creation_days = 0 means “ignore creation date”).

🗂️ Backup & Cleanup
All moved files go into a bak folder inside the script/exe directory (not in the scanned folder).

If a file name already exists in bak, an incremental suffix (_1, _2, …) is added automatically.

To delete the entire bak folder, run:
clean_bak.exe
